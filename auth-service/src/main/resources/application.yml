spring:
  application:
    name: auth-service
  datasource:
    url: ${AUTH_DATASOURCE_URL:jdbc:postgresql://localhost:5432/auth}
    username: ${AUTH_DATASOURCE_USERNAME:auth_user}
    password: ${AUTH_DATASOURCE_PASSWORD:auth}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

# Auth domain config. The JWKS data-encryption key seals signing-key private material at rest
# (AES-256-GCM): a base64-encoded 32-byte secret, supplied via env, never committed (SDD-001 §4
# invariant 6). No default — the service must be told its key.
auth:
  jwks:
    encryption-key: ${AUTH_JWKS_ENC_KEY:}

server:
  port: ${AUTH_PORT:3333}

# Liveness at GET /health (actuator remapped to the root base-path).
management:
  endpoints:
    web:
      base-path: /
      exposure:
        include: health
