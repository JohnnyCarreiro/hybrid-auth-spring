services:
  # One instance, two isolated databases (auth + app) created by the init script — ADR-0003.
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hybrid}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hybrid}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hybrid}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    environment:
      AUTH_PORT: 3333
      AUTH_DATASOURCE_URL: jdbc:postgresql://postgres:5432/auth
      AUTH_DATASOURCE_USERNAME: auth_user
      AUTH_DATASOURCE_PASSWORD: auth
    ports:
      - "3333:3333"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3333/health"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s

  resource-service:
    build:
      context: .
      dockerfile: resource-service/Dockerfile
    environment:
      RESOURCE_PORT: 3334
      APP_DATASOURCE_URL: jdbc:postgresql://postgres:5432/app
      APP_DATASOURCE_USERNAME: app_user
      APP_DATASOURCE_PASSWORD: app
    ports:
      - "3334:3334"
    # Starts only after auth-service is healthy — it verifies JWTs against the
    # auth-service JWKS, so auth must be up first (ADR-0002).
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3334/health"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s

volumes:
  pgdata:
