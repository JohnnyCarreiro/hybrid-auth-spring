# Local git hooks via lefthook (binary in ./.tools/lefthook — run `just hooks-install`).
# These are convenience / fast-feedback only and are bypassable with --no-verify.
# The authoritative guard is GitHub branch protection (dev/main require PRs; main is no-bypass).

pre-commit:
  piped: true
  commands:
    guard-branch:
      run: |
        b=$(git rev-parse --abbrev-ref HEAD)
        case "$b" in
          dev|main) echo "✋ no direct commits on '$b' — use a feat/epic branch and open a PR"; exit 1 ;;
        esac
    spotless:
      glob: "*.java"
      run: ./gradlew spotlessApply
      stage_fixed: true

commit-msg:
  commands:
    conventional:
      run: |
        head -1 "{1}" | grep -qE '^(feat|fix|docs|chore|refactor|test|build|ci|perf|style|revert)(\([a-z0-9-]+\))?!?: .+' \
          || { echo "✋ commit message must follow Conventional Commits: type(scope): subject"; exit 1; }

pre-push:
  commands:
    guard-branch:
      run: |
        b=$(git rev-parse --abbrev-ref HEAD)
        case "$b" in
          dev|main) echo "✋ don't push '$b' directly — open a PR (branch protection enforces this server-side)"; exit 1 ;;
        esac
