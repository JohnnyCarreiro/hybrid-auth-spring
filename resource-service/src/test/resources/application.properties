# Test-only configuration for the resource-service integration tests.
#
# JwksTokenVerifier is constructed at context load and needs a syntactically valid URI, but it is
# never invoked here: TestSecurityConfig contributes a @Primary JwtDecoder that verifies against a
# fixed in-test RSA key, so tests mint their own tokens with no network call to a JWKS endpoint.
resource.auth.jwks-uri=http://localhost:0/.well-known/jwks.json
